<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Memory Match</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== TITLE SCREEN ===== -->
  <div id="screen-title" class="screen active">
    <div class="title-bg">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="sun"></div>
    </div>

    <div class="title-content">
      <h1 class="game-title">
        <span class="title-memory">Memory</span>
        <span class="title-match">Match</span>
      </h1>

      <p class="title-hint">Tap a card to add your photo!</p>

      <div class="card-configurator">
        <div class="config-card" data-color-index="0" data-color="red">
          <div class="config-card-inner">
            <div class="config-card-front" style="background: var(--color-red);">
              <span class="card-plus">+</span>
            </div>
          </div>
        </div>
        <div class="config-card" data-color-index="1" data-color="orange">
          <div class="config-card-inner">
            <div class="config-card-front" style="background: var(--color-orange);">
              <span class="card-plus">+</span>
            </div>
          </div>
        </div>
        <div class="config-card" data-color-index="2" data-color="yellow">
          <div class="config-card-inner">
            <div class="config-card-front" style="background: var(--color-yellow);">
              <span class="card-plus">+</span>
            </div>
          </div>
        </div>
        <div class="config-card" data-color-index="3" data-color="green">
          <div class="config-card-inner">
            <div class="config-card-front" style="background: var(--color-green);">
              <span class="card-plus">+</span>
            </div>
          </div>
        </div>
        <div class="config-card" data-color-index="4" data-color="blue">
          <div class="config-card-inner">
            <div class="config-card-front" style="background: var(--color-blue);">
              <span class="card-plus">+</span>
            </div>
          </div>
        </div>
        <div class="config-card" data-color-index="5" data-color="purple">
          <div class="config-card-inner">
            <div class="config-card-front" style="background: var(--color-purple);">
              <span class="card-plus">+</span>
            </div>
          </div>
        </div>
      </div>

      <button class="btn-start" id="btn-start">
        <span>Start</span>
      </button>
    </div>

    <div class="ground"></div>
  </div>

  <!-- ===== PHOTO DIALOG ===== -->
  <div id="photo-dialog" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">Photo Time!</h2>
      <div class="camera-area">
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <img id="photo-preview" src="" alt="Preview" style="display:none;" />
        <div class="camera-placeholder" id="camera-placeholder">
          <span>📷</span>
          <p>Camera loading…</p>
        </div>
      </div>
      <div class="modal-actions" id="modal-actions-take">
        <button class="btn-photo" id="btn-take-photo">Take Photo</button>
      </div>
      <div class="modal-actions hidden" id="modal-actions-confirm">
        <button class="btn-update" id="btn-update">Update</button>
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== GAMEPLAY SCREEN ===== -->
  <div id="screen-game" class="screen">
    <div class="game-bg">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
    </div>

    <div class="game-hud">
      <div class="hud-level">
        <div class="hud-sign">Level <span id="hud-level-num">1</span></div>
      </div>
      <div class="hud-right">
        <div class="hud-timer">⏱ <span id="hud-time">00:00</span></div>
        <div class="hud-lives" id="hud-lives">
          <span class="heart">❤️</span>
          <span class="heart">❤️</span>
          <span class="heart">❤️</span>
        </div>
      </div>
    </div>

    <div class="game-board-wrap">
      <div class="game-board" id="game-board"></div>
    </div>

    <div class="ground game-ground"></div>
  </div>

  <!-- ===== GAME OVER SCREEN ===== -->
  <div id="screen-gameover" class="screen">
    <div class="title-bg">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
    </div>
    <div class="title-content">
      <h2 class="gameover-title" id="gameover-title">Game Over!</h2>
      <p class="gameover-sub" id="gameover-sub">You reached Level 3</p>
      <button class="btn-start" id="btn-play-again"><span>Play Again</span></button>
    </div>
    <div class="ground"></div>
  </div>

  <!-- ===== LEVEL COMPLETE OVERLAY ===== -->
  <div id="overlay-levelup" class="overlay-levelup hidden">
    <div class="levelup-box">
      <div class="stars">⭐⭐⭐</div>
      <h2>Level Complete!</h2>
      <p id="levelup-msg">Get ready for Level 2!</p>
      <button class="btn-start btn-small" id="btn-next-level"><span>Next Level</span></button>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
