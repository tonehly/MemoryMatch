<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="title-screen">
        <h1>Memory Match Game</h1>
        <p>Click the cards below to take photos for the game pieces, or play with default colors.</p>
        <div id="photo-options">
            <div class="photo-card" data-index="0"></div>
            <div class="photo-card" data-index="1"></div>
            <div class="photo-card" data-index="2"></div>
            <div class="photo-card" data-index="3"></div>
            <div class="photo-card" data-index="4"></div>
            <div class="photo-card" data-index="5"></div>
        </div>
        <button id="start-game">Start Game</button>
    </div>
    <div id="game-screen" class="hidden">
        <div id="level-info">
            <span id="level">Level 1</span>
            <span id="moves">Moves: 0</span>
        </div>
        <div id="game-board"></div>
        <div id="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
